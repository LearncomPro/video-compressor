<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Compressor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f4f5f8; color: #1a1a2e; padding: 24px;
  }
  .card {
    width: 100%; max-width: 560px; background: #fff;
    border-radius: 14px; padding: 36px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  .drop {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 2px dashed #c5c9d6; border-radius: 12px; padding: 44px 20px;
    cursor: pointer; transition: all .2s; margin-bottom: 20px;
  }
  .drop.over { border-color: #e5593f; background: rgba(229,89,63,.05); }
  .drop svg { margin-bottom: 10px; }
  .drop .name { font-size: 14px; font-weight: 500; }
  .drop .size { font-size: 12px; color: #999; margin-top: 4px; }
  .drop input { display: none; }
  .status { font-size: 13px; color: #e5593f; margin-bottom: 16px; min-height: 18px; }
  .actions { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; }
  .row label { min-width: 90px; font-weight: 500; }
  select {
    padding: 8px 12px; border-radius: 6px; border: 1px solid #d1d5db;
    font-size: 13px; background: #fff; flex: 1;
  }
  input[type=range] { flex: 1; accent-color: #e5593f; }
  .quality-val { min-width: 40px; text-align: center; font-weight: 600; font-size: 13px; }
  .btn-primary {
    padding: 12px 0; border-radius: 8px; border: none;
    background: #e5593f; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .2s; margin-top: 4px;
  }
  .btn-primary:hover { background: #d04832; }
  .btn-primary:disabled { background: #a0aec0; cursor: default; }
  .progress { width: 100%; height: 6px; background: #e2e5ea; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
  .progress-bar { height: 100%; background: #e5593f; border-radius: 3px; transition: width .3s; width: 0; }
  .result {
    margin-top: 16px; padding: 16px; background: #f0faf0; border-radius: 10px;
    font-size: 13px; display: flex; flex-direction: column; gap: 10px;
  }
  .stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .04em; }
  .stat-value { font-size: 16px; font-weight: 700; }
  .btn-download {
    padding: 10px 20px; border-radius: 8px; border: none;
    background: #38a169; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; align-self: flex-start;
  }
  .btn-download:hover { background: #2f855a; }
  .hidden { display: none; }
  .info-box {
    padding: 12px 14px; background: #fff8f0; border-radius: 8px;
    font-size: 12px; color: #9c6a30; line-height: 1.5; border: 1px solid #f0e0c8;
  }
  video { width: 100%; border-radius: 8px; margin-bottom: 12px; background: #000; }
</style>
</head>
<body>
<div class="card">
  <h1>Video Compressor</h1>
  <p class="sub">Kompresja wideo w przeglądarce — pliki nie opuszczają Twojego komputera.</p>

  <label class="drop" id="dropZone">
    <input type="file" accept="video/*" id="fileInput">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8b90a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    <span class="name" id="fileName">Upuść wideo lub kliknij</span>
    <span class="size hidden" id="fileSize"></span>
  </label>

  <video id="preview" class="hidden" controls muted playsinline></video>

  <div class="progress hidden" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="status" id="status"></p>

  <div class="actions hidden" id="actions">
    <div class="row">
      <label>Rozdzielczość:</label>
      <select id="resSelect">
        <option value="">Oryginalna</option>
        <option value="1920">1080p</option>
        <option value="1280" selected>720p</option>
        <option value="854">480p</option>
        <option value="640">360p</option>
      </select>
    </div>
    <div class="row">
      <label>Jakość:</label>
      <input type="range" id="qualityRange" min="0" max="100" value="60" step="5">
      <span class="quality-val" id="qualityVal">60%</span>
    </div>
    <div class="info-box">
      Wyższa jakość = lepszy obraz, większy plik. 80–100% to wysoka jakość, 40–60% to dobry kompromis, 10–30% to mocna kompresja.
    </div>
    <button class="btn-primary" id="btnCompress">Kompresuj</button>
  </div>

  <div class="result hidden" id="result">
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Przed</span>
        <span class="stat-value" id="sizeBefore">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Po</span>
        <span class="stat-value" id="sizeAfter">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Redukcja</span>
        <span class="stat-value" id="reduction">—</span>
      </div>
    </div>
    <button class="btn-download" id="btnDownload">Pobierz skompresowane wideo</button>
  </div>
</div>

<!-- Inline worker code to avoid CORS issues on GitHub Pages -->
<script id="ffmpeg-worker-code" type="text/js-worker">
const FFMessageType = { LOAD:"LOAD", EXEC:"EXEC", WRITE_FILE:"WRITE_FILE", READ_FILE:"READ_FILE", DELETE_FILE:"DELETE_FILE", RENAME:"RENAME", CREATE_DIR:"CREATE_DIR", LIST_DIR:"LIST_DIR", DELETE_DIR:"DELETE_DIR", MOUNT:"MOUNT", UNMOUNT:"UNMOUNT", ERROR:"ERROR", LOG:"LOG", PROGRESS:"PROGRESS" };
const CORE_URL = "https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js";
const ERROR_UNKNOWN_MESSAGE_TYPE = new Error("unknown message type");
const ERROR_NOT_LOADED = new Error("ffmpeg is not loaded, call `await ffmpeg.load()` first");
const ERROR_IMPORT_FAILURE = new Error("failed to import ffmpeg-core.js");
let ffmpeg;
const load = async ({ coreURL: _coreURL, wasmURL: _wasmURL, workerURL: _workerURL }) => {
    const first = !ffmpeg;
    try {
        if (!_coreURL) _coreURL = CORE_URL;
        importScripts(_coreURL);
    } catch {
        if (!_coreURL) _coreURL = CORE_URL.replace('/umd/', '/esm/');
        self.createFFmpegCore = (await import(_coreURL)).default;
        if (!self.createFFmpegCore) throw ERROR_IMPORT_FAILURE;
    }
    const coreURL = _coreURL;
    const wasmURL = _wasmURL ? _wasmURL : _coreURL.replace(/.js$/g, ".wasm");
    const workerURL = _workerURL ? _workerURL : _coreURL.replace(/.js$/g, ".worker.js");
    ffmpeg = await self.createFFmpegCore({
        mainScriptUrlOrBlob: `${coreURL}#${btoa(JSON.stringify({ wasmURL, workerURL }))}`,
    });
    ffmpeg.setLogger((data) => self.postMessage({ type: FFMessageType.LOG, data }));
    ffmpeg.setProgress((data) => self.postMessage({ type: FFMessageType.PROGRESS, data }));
    return first;
};
const exec = ({ args, timeout = -1 }) => { ffmpeg.setTimeout(timeout); ffmpeg.exec(...args); const ret = ffmpeg.ret; ffmpeg.reset(); return ret; };
const writeFile = ({ path, data }) => { ffmpeg.FS.writeFile(path, data); return true; };
const readFile = ({ path, encoding }) => ffmpeg.FS.readFile(path, { encoding });
const deleteFile = ({ path }) => { ffmpeg.FS.unlink(path); return true; };
const rename = ({ oldPath, newPath }) => { ffmpeg.FS.rename(oldPath, newPath); return true; };
const createDir = ({ path }) => { ffmpeg.FS.mkdir(path); return true; };
const listDir = ({ path }) => { const names = ffmpeg.FS.readdir(path); const nodes = []; for (const name of names) { const stat = ffmpeg.FS.stat(`${path}/${name}`); const isDir = ffmpeg.FS.isDir(stat.mode); nodes.push({ name, isDir }); } return nodes; };
const deleteDir = ({ path }) => { ffmpeg.FS.rmdir(path); return true; };
const mount = ({ fsType, options, mountPoint }) => { const str = fsType; const fs = ffmpeg.FS.filesystems[str]; if (!fs) return false; ffmpeg.FS.mount(fs, options, mountPoint); return true; };
const unmount = ({ mountPoint }) => { ffmpeg.FS.unmount(mountPoint); return true; };
self.onmessage = async ({ data: { id, type, data: _data } }) => {
    const trans = [];
    let data;
    try {
        if (type !== FFMessageType.LOAD && !ffmpeg) throw ERROR_NOT_LOADED;
        switch (type) {
            case FFMessageType.LOAD: data = await load(_data); break;
            case FFMessageType.EXEC: data = exec(_data); break;
            case FFMessageType.WRITE_FILE: data = writeFile(_data); break;
            case FFMessageType.READ_FILE: data = readFile(_data); break;
            case FFMessageType.DELETE_FILE: data = deleteFile(_data); break;
            case FFMessageType.RENAME: data = rename(_data); break;
            case FFMessageType.CREATE_DIR: data = createDir(_data); break;
            case FFMessageType.LIST_DIR: data = listDir(_data); break;
            case FFMessageType.DELETE_DIR: data = deleteDir(_data); break;
            case FFMessageType.MOUNT: data = mount(_data); break;
            case FFMessageType.UNMOUNT: data = unmount(_data); break;
            default: throw ERROR_UNKNOWN_MESSAGE_TYPE;
        }
    } catch (e) { self.postMessage({ id, type: FFMessageType.ERROR, data: e.toString() }); return; }
    if (data instanceof Uint8Array) { trans.push(data.buffer); }
    self.postMessage({ id, type, data }, trans);
};
</script>

<script type="module">
// ---- Minimal FFmpeg wrapper that uses the inline worker ----
const FFMessageType = { LOAD:"LOAD", EXEC:"EXEC", WRITE_FILE:"WRITE_FILE", READ_FILE:"READ_FILE", DELETE_FILE:"DELETE_FILE", RENAME:"RENAME", CREATE_DIR:"CREATE_DIR", LIST_DIR:"LIST_DIR", DELETE_DIR:"DELETE_DIR", MOUNT:"MOUNT", UNMOUNT:"UNMOUNT", ERROR:"ERROR", LOG:"LOG", PROGRESS:"PROGRESS" };

class FFmpegClient {
  constructor() {
    this._worker = null;
    this._id = 0;
    this._resolves = {};
    this._logCb = null;
    this._progressCb = null;
  }
  on(event, cb) {
    if (event === 'log') this._logCb = cb;
    if (event === 'progress') this._progressCb = cb;
  }
  async load(config) {
    // Create worker from inline script
    const code = document.getElementById('ffmpeg-worker-code').textContent;
    const blob = new Blob([code], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    this._worker = new Worker(url);
    this._worker.onmessage = ({ data: { id, type, data } }) => {
      if (type === FFMessageType.LOG && this._logCb) { this._logCb(data); return; }
      if (type === FFMessageType.PROGRESS && this._progressCb) { this._progressCb(data); return; }
      if (this._resolves[id]) { this._resolves[id](data); delete this._resolves[id]; }
    };
    return this._send(FFMessageType.LOAD, config);
  }
  exec(args) { return this._send(FFMessageType.EXEC, { args }); }
  writeFile(path, data) { return this._send(FFMessageType.WRITE_FILE, { path, data }, data instanceof Uint8Array ? [data.buffer] : []); }
  readFile(path) { return this._send(FFMessageType.READ_FILE, { path }); }
  deleteFile(path) { return this._send(FFMessageType.DELETE_FILE, { path }); }
  _send(type, data, trans = []) {
    return new Promise(resolve => {
      const id = this._id++;
      this._resolves[id] = resolve;
      this._worker.postMessage({ id, type, data }, trans);
    });
  }
}

// ---- Helpers ----
async function toBlobURL(url, mimeType) {
  const resp = await fetch(url);
  const body = await resp.blob();
  const blob = new Blob([body], { type: mimeType });
  return URL.createObjectURL(blob);
}
async function fetchFile(file) {
  const buf = await file.arrayBuffer();
  return new Uint8Array(buf);
}

// ---- UI ----
const $ = s => document.getElementById(s);
const dropZone = $("dropZone"), fileInput = $("fileInput"), statusEl = $("status");
const actions = $("actions"), progressWrap = $("progressWrap"), progressBar = $("progressBar");
const preview = $("preview"), result = $("result");

let loadedFile = null, outputBlob = null, ffmpeg = null;

function setProgress(p) { progressWrap.classList.remove("hidden"); progressBar.style.width = Math.min(100,p)+"%"; }
function hideProgress() { progressWrap.classList.add("hidden"); progressBar.style.width = "0"; }
function fmtSize(b) { return b < 1024*1024 ? (b/1024).toFixed(0)+" KB" : (b/1024/1024).toFixed(1)+" MB"; }

// Quality slider: 0-100% maps to CRF 40-18 (inverted, lower CRF = better quality)
function qualityToCRF(q) { return Math.round(40 - (q / 100) * 22); }

dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("over"); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener("change", () => { if(fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(f) {
  if (!f.type.startsWith("video/")) { statusEl.textContent = "Wybierz plik wideo."; return; }
  loadedFile = f;
  $("fileName").textContent = f.name;
  $("fileSize").textContent = fmtSize(f.size);
  $("fileSize").classList.remove("hidden");
  preview.src = URL.createObjectURL(f);
  preview.classList.remove("hidden");
  actions.classList.remove("hidden");
  result.classList.add("hidden");
  statusEl.textContent = "";
  hideProgress();
}

$("qualityRange").addEventListener("input", () => {
  $("qualityVal").textContent = $("qualityRange").value + "%";
});

async function initFFmpeg() {
  if (ffmpeg) return;
  statusEl.textContent = "Ładowanie silnika kompresji (pierwszy raz ~30s)...";
  setProgress(5);

  ffmpeg = new FFmpegClient();

  ffmpeg.on('progress', ({ progress }) => {
    const pct = Math.max(0, Math.min(100, Math.round(progress * 100)));
    setProgress(pct);
    statusEl.textContent = "Kompresja: " + pct + "%";
  });

  ffmpeg.on('log', ({ message }) => { console.log('[ffmpeg]', message); });

  const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
  await ffmpeg.load({
    coreURL: await toBlobURL(baseURL + '/ffmpeg-core.js', 'text/javascript'),
    wasmURL: await toBlobURL(baseURL + '/ffmpeg-core.wasm', 'application/wasm'),
  });

  setProgress(10);
  statusEl.textContent = "Silnik gotowy.";
}

$("btnCompress").addEventListener("click", async () => {
  if (!loadedFile) return;
  const btn = $("btnCompress");
  btn.disabled = true;
  result.classList.add("hidden");

  try {
    await initFFmpeg();

    const ext = loadedFile.name.split('.').pop() || 'mp4';
    const inputName = 'input.' + ext;
    const outputName = 'output.mp4';
    const quality = parseInt($("qualityRange").value);
    const crf = qualityToCRF(quality).toString();
    const res = $("resSelect").value;

    statusEl.textContent = "Wczytywanie pliku do pamięci...";
    setProgress(0);
    await ffmpeg.writeFile(inputName, await fetchFile(loadedFile));

    const args = ['-i', inputName, '-c:v', 'libx264', '-crf', crf, '-preset', 'fast'];
    if (res) args.push('-vf', 'scale=' + res + ':-2');
    args.push('-c:a', 'aac', '-b:a', '128k', '-movflags', '+faststart', outputName);

    statusEl.textContent = "Kompresja w toku...";
    await ffmpeg.exec(args);

    const data = await ffmpeg.readFile(outputName);
    outputBlob = new Blob([data.buffer], { type: 'video/mp4' });

    const origSize = loadedFile.size;
    const newSize = outputBlob.size;
    const pctReduction = Math.round((1 - newSize / origSize) * 100);

    $("sizeBefore").textContent = fmtSize(origSize);
    $("sizeAfter").textContent = fmtSize(newSize);
    $("reduction").textContent = (pctReduction > 0 ? "-" : "+") + Math.abs(pctReduction) + "%";
    $("reduction").style.color = pctReduction > 0 ? "#38a169" : "#e53e3e";

    result.classList.remove("hidden");
    setProgress(100);
    statusEl.textContent = "Gotowe!";

    await ffmpeg.deleteFile(inputName);
    await ffmpeg.deleteFile(outputName);
  } catch (e) {
    statusEl.textContent = "Błąd: " + e.message;
    console.error(e);
  }
  btn.disabled = false;
  setTimeout(hideProgress, 2000);
});

$("btnDownload").addEventListener("click", () => {
  if (!outputBlob) return;
  const base = loadedFile.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(outputBlob);
  const a = document.createElement("a");
  a.href = url; a.download = base + "_compressed.mp4"; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
});
</script>
</body>
</html>
